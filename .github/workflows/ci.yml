name: frontend ci

on:
  push:
    branches: [frontend]
  pull_request:
    branches: [frontend]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install dependencies
        run: npm ci

      - name: build
        run: npm run build
